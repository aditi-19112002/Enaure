<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll UI</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* Hide scrollbar */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>

<body class="bg-gray-100">

<div class="px-6 py-6 overflow-x-auto no-scrollbar scroll-smooth">
  
  <div class="flex gap-6 min-w-max">

    <div class="text-center shrink-0">
      <img src="https://picsum.photos/100?1" class="w-28 h-28 rounded-xl object-cover mx-auto shadow">
      <p class="text-sm mt-2">1gm Gold Jewels</p>
    </div>

    <div class="text-center shrink-0">
      <img src="https://picsum.photos/100?2" class="w-28 h-28 rounded-xl object-cover mx-auto shadow">
      <p class="text-sm mt-2">Bridal Set</p>
    </div>

    <div class="text-center shrink-0">
      <img src="https://picsum.photos/100?3" class="w-28 h-28 rounded-xl object-cover mx-auto shadow">
      <p class="text-sm mt-2">American Diamonds</p>
    </div>

    <div class="text-center shrink-0">
      <img src="https://picsum.photos/100?4" class="w-28 h-28 rounded-xl object-cover mx-auto shadow">
      <p class="text-sm mt-2">Western</p>
    </div>

    <div class="text-center shrink-0">
      <img src="https://picsum.photos/100?5" class="w-28 h-28 rounded-xl object-cover mx-auto shadow">
      <p class="text-sm mt-2">Mangalsutra</p>
    </div>

    <div class="text-center shrink-0">
      <img src="https://picsum.photos/100?6" class="w-28 h-28 rounded-xl object-cover mx-auto shadow">
      <p class="text-sm mt-2">Earrings</p>
    </div>

  </div>

</div>



<img alt="Enaure Dark Elegant" loading="lazy" decoding="async" data-nimg="fill" class="object-cover transform group-hover:scale-105 transition-transform duration-1000 ease-in-out" src="https://ik.imagekit.io/enaure/home/4.webp?tr=f-webp,q-80" style="position: absolute; height: 100%; width: 100%; inset: 0px; color: transparent;">

</body>
</html>
