<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll UI</title>
  <script src="https://cdn.tailwindcss.com"></script>
<div class="animate-bounce">Bounce</div>
<div class="animate-spin">Loading</div>
<div class="animate-pulse">Pulse</div>
<div class="animate-ping">Ping</div>

<div class="relative flex items-center justify-center h-screen">

  <!-- Ping effect -->
  <span class="absolute inline-flex h-6 w-6 rounded-full bg-blue-400 opacity-75 animate-ping"></span>

  <!-- Center dot -->
  <span class="relative inline-flex h-6 w-6 rounded-full bg-blue-600"></span>

</div>

<div class="flex justify-center items-center h-screen bg-gray-100">
  
  <div class="bg-white p-6 rounded-xl shadow-lg transform transition duration-500 hover:scale-105 hover:shadow-2xl">
    
    <h2 class="text-xl font-bold mb-2">Card</h2>
    <p class="text-gray-500">Hover for animation</p>
    
  </div>

  <button class="bg-blue-500 text-white px-4 py-2 rounded transition duration-300 hover:bg-blue-700">
  Hover Me
</button>

</div>
</body>
</html>
