<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Blast Effect</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black flex items-center justify-center min-h-screen overflow-hidden">


  <div id="bg"
    class="absolute inset-0 transition-all duration-700 bg-gradient-to-br from-purple-600 via-pink-500 to-red-500">
  </div>


  <div class="relative z-10 text-center bg-white/10 backdrop-blur-xl p-10 rounded-3xl shadow-2xl border border-white/20 w-[90%] max-w-xl">

    <h1 class="text-4xl md:text-5xl font-bold text-white mb-4">
      Color Effect
    </h1>

    <p class="text-white/80 text-lg mb-8">
      Click the button and watch the background magic
    </p>

    <button onclick="changeColor()"
      class="px-8 py-4 bg-white text-black font-bold rounded-full hover:scale-110 transition duration-300 shadow-lg">
      Change Color
    </button>

  </div>

  <script>
    const gradients = [
      "from-purple-600 via-pink-500 to-red-500",
      "from-blue-500 via-cyan-400 to-teal-300",
      "from-yellow-400 via-orange-500 to-red-600",
      "from-green-400 via-lime-400 to-emerald-500",
      "from-indigo-500 via-violet-500 to-fuchsia-500",
      "from-rose-400 via-pink-500 to-purple-600"
    ];

    let index = 0;

    function changeColor() {
      const bg = document.getElementById("bg");

      bg.className =
        "absolute inset-0 transition-all duration-700 bg-gradient-to-br " +
        gradients[index];

      index++;
      if (index >= gradients.length) {
        index = 0;
      }
    }
  </script>

</body>
</html>
