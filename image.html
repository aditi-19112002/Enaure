<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Card</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-10">



  <div class="max-w-sm mx-auto">

    
    <div class="bg-white rounded-xl shadow-md overflow-hidden border group">

      
      <div class="relative w-full h-[300px] overflow-hidden">

        
        <img 
          src="https://ik.imagekit.io/enaure/Ecommerce/Product/Variants/698f1e4e2c178_aSVE2zh32.png?tr=f-webp,q-80"
          class="absolute w-full h-full object-cover transition-opacity duration-500 group-hover:opacity-0"
          alt="product">

     
        <img 
          src="https://ik.imagekit.io/enaure/Ecommerce/Product/Variants/698f109da980b_jQ_gggJlJ.png?tr=f-webp,q-80"
          class="absolute w-full h-full object-cover opacity-0 transition-opacity duration-500 group-hover:opacity-100"
          alt="product hover">

        <span class="absolute top-3 left-3 bg-white text-red-600 text-xs font-bold px-3 py-1 rounded">
          SALE
        </span>

        <div class="absolute top-3 right-3 bg-white w-10 h-10 rounded-full flex items-center justify-center shadow cursor-pointer">
          ♡
        </div>
      </div>

      <div class="p-5 text-center">

        <h3 class="text-lg font-medium text-gray-800 leading-6">
          Open Heart Crystal Promise Ring
        </h3>

        <p class="text-yellow-400 text-sm mt-2">
          ★★★★★ <span class="text-gray-400">(0)</span>
        </p>

        <div class="mt-3">
          <span class="text-[#9b003f] text-2xl font-bold">₹149</span>
          <span class="text-gray-400 line-through ml-2">₹299</span>
        </div>

        <p class="text-green-600 font-semibold mt-2">
          SAVE ₹150
        </p>

        <button class="w-full mt-5 bg-[#9b003f] text-white py-3 rounded-md font-semibold hover:bg-[#7a0031] transition">
          VIEW DETAILS
        </button>

      </div>
    </div>

  </div>

</body>
</html>
